<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Cash • Daily Spin</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .main-container {
            max-width: 1300px;
            width: 100%;
            z-index: 10;
        }

        /* Header - Pehle Jaisa */
        .header {
            background: white;
            border-radius: 30px;
            padding: 20px 35px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area i {
            font-size: 36px;
            color: #fbbf24;
        }

        .logo-area h1 {
            font-size: 36px;
            font-weight: 700;
            color: #1e293b;
        }

        .balance-card {
            background: #f8fafc;
            border-radius: 100px;
            padding: 15px 35px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid #e2e8f0;
        }

        .balance-label {
            color: #475569;
            font-size: 15px;
            font-weight: 500;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 800;
            color: #fbbf24;
        }

        .balance-currency {
            color: #64748b;
            font-weight: 600;
        }

        /* Main Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.9fr;
            gap: 30px;
        }

        /* Spin Card - Pehle Jaisa */
        .spin-card {
            background: white;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.2);
        }

        .spin-header {
            margin-bottom: 30px;
        }

        .spin-header h2 {
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .spin-header h2 i {
            color: #fbbf24;
            font-size: 36px;
        }

        /* Wheel - Pehle Jaisa */
        .wheel-wrapper {
            position: relative;
            width: 380px;
            margin: 20px auto 30px;
        }

        canvas#wheelCanvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2);
            border: 4px solid white;
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid #e53e3e;
            z-index: 5;
        }

        /* Spin Button - Pehle Jaisa */
        .spin-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 80px;
            color: white;
            font-size: 26px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 20px 30px -8px #fbbf24, 0 6px 0 #b45309;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 30px 0 20px;
        }

        .spin-btn:active {
            transform: translateY(6px);
            box-shadow: 0 15px 25px -8px #fbbf24, 0 2px 0 #b45309;
        }

        .result-message {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            padding: 20px;
            background: #f8fafc;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
        }

        /* Withdrawal Card - Pehle Jaisa */
        .withdraw-card {
            background: white;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.2);
        }

        .withdraw-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #e2e8f0;
        }

        .withdraw-header h2 {
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .withdraw-header h2 span {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 14px;
        }

        /* Method Grid - Pehle Jaisa */
        .method-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .method-btn {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .method-btn img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .method-btn.active {
            border-color: #fbbf24;
            background: #fef9e7;
        }

        .method-btn span {
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }

        /* Form - Pehle Jaisa, Lekin Bilkul Khali */
        .withdraw-form {
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #475569;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            color: #1e293b;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #fbbf24;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .withdraw-action-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 30px 0 20px;
        }

        .withdraw-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -8px #fbbf24;
        }

        /* History - Pehle Jaisa */
        .withdraw-history {
            margin-top: 30px;
            background: #f8fafc;
            border-radius: 30px;
            padding: 25px;
            max-height: 220px;
            overflow-y: auto;
        }

        .history-title {
            color: #334155;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #cbd5e1;
        }

        .history-title i {
            color: #fbbf24;
            font-size: 22px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 30px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .history-item span:last-child {
            background: #dcfce7;
            color: #166534;
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Stats - Sab Zero */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-box {
            background: white;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 34px;
            font-weight: 800;
            color: #fbbf24;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
        }

        /* Money Rain */
        .money-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .money-note {
            position: absolute;
            color: #fbbf24;
            font-size: 28px;
            opacity: 0;
            animation: moneyFall 3s linear forwards;
        }

        @keyframes moneyFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 1000px) {
            .content-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="money-rain" id="moneyRain"></div>

    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <div class="logo-area">
                <i class="fas fa-coins"></i>
                <h1>Earn Cash</h1>
            </div>
            <div class="balance-card">
                <span class="balance-label">Your Balance</span>
                <span class="balance-amount" id="userBalance">0</span>
                <span class="balance-currency">PKR</span>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="content-grid">
            <!-- Spin Card -->
            <div class="spin-card">
                <div class="spin-header">
                    <h2>
                        <i class="fas fa-dharmachakra"></i>
                        Daily Spin
                    </h2>
                </div>

                <div class="wheel-wrapper">
                    <canvas id="wheelCanvas" width="400" height="400"></canvas>
                    <div class="wheel-pointer"></div>
                </div>

                <button class="spin-btn" id="spinButton" onclick="spinWheel()">
                    <i class="fas fa-dharmachakra"></i> SPIN NOW
                </button>

                <div class="result-message" id="spinResult">
                    Click Spin to try your luck!
                </div>
            </div>

            <!-- Withdrawal Card - Pehle Jaisa, Lekin Fields Khali -->
            <div class="withdraw-card">
                <div class="withdraw-header">
                    <h2>
                        Withdraw Cash
                        <span>INSTANT</span>
                    </h2>
                </div>

                <!-- Method Grid -->
                <div class="method-grid">
                    <div class="method-btn active" id="methodEasypaisa" onclick="selectMethod('easypaisa')">
                        <img src="https://crystalpng.com/wp-content/uploads/2026/03/easypaisa-logo.png" 
                             alt="Easypaisa">
                        <span>Easypaisa</span>
                    </div>
                    <div class="method-btn" id="methodJazzcash" onclick="selectMethod('jazzcash')">
                        <img src="https://crystalpng.com/wp-content/uploads/2024/12/new-jazzcash-logo.png" 
                             alt="JazzCash">
                        <span>JazzCash</span>
                    </div>
                    <div class="method-btn" id="methodUpaisa" onclick="selectMethod('upaisa')">
                        <img src="https://crystalpng.com/wp-content/uploads/2025/09/upaisa-logo.png" 
                             alt="UPaisa">
                        <span>UPaisa</span>
                    </div>
                </div>

                <!-- Form - Bilkul Khali -->
                <div class="withdraw-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="accountName" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="text" id="accountNumber" placeholder="03XX-XXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>Amount (PKR) - Min 100</label>
                        <input type="number" id="withdrawAmount" placeholder="Enter amount" min="100">
                    </div>

                    <button class="withdraw-action-btn" onclick="processWithdrawal()">
                        <i class="fas fa-arrow-right"></i> WITHDRAW NOW
                    </button>
                </div>

                <!-- History -->
                <div class="withdraw-history">
                    <div class="history-title">
                        <i class="fas fa-clock-rotate-left"></i> Recent Transactions
                    </div>
                    <div id="historyList">
                        <!-- Empty initially -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats - Sab Zero -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="totalWon">0</div>
                <div class="stat-label">Total Won</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="todaySpins">0</div>
                <div class="stat-label">Today's Spins</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="biggestWin">0</div>
                <div class="stat-label">Biggest Win</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="payouts">0</div>
                <div class="stat-label">Payouts</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== SPIN WHEEL ==========
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const spinResult = document.getElementById('spinResult');
            const spinButton = document.getElementById('spinButton');
            const balanceSpan = document.getElementById('userBalance');
            
            // Stats elements - sab zero
            const totalWonEl = document.getElementById('totalWon');
            const todaySpinsEl = document.getElementById('todaySpins');
            const biggestWinEl = document.getElementById('biggestWin');
            const payoutsEl = document.getElementById('payouts');
            const historyList = document.getElementById('historyList');

            // Prize segments
            const segments = [
                { label: '1 RS', value: 1, color: '#F87171' },
                { label: '😞', value: 0, color: '#9CA3AF' },
                { label: '10 RS', value: 10, color: '#FBBF24' },
                { label: '2 RS', value: 2, color: '#FCA5A5' },
                { label: '😞', value: 0, color: '#9CA3AF' },
                { label: '15 RS', value: 15, color: '#34D399' },
                { label: '5 RS', value: 5, color: '#60A5FA' },
                { label: '😞', value: 0, color: '#9CA3AF' },
                { label: '5.5 RS', value: 5.5, color: '#C084FC' }
            ];

            let currentAngle = 0;
            let isSpinning = false;
            let balance = 0; // Zero se start
            let spinCount = 0;
            
            // Daily stats - sab zero
            let dailyStats = {
                totalWon: 0,
                todaySpins: 0,
                biggestWin: 0,
                payouts: 0,
                history: []
            };
            
            balanceSpan.innerText = balance;

            function updateStatsDisplay() {
                totalWonEl.innerText = dailyStats.totalWon;
                todaySpinsEl.innerText = dailyStats.todaySpins;
                biggestWinEl.innerText = dailyStats.biggestWin;
                payoutsEl.innerText = dailyStats.payouts;
                
                historyList.innerHTML = dailyStats.history.map(item => `
                    <div class="history-item">
                        <span>${item.method} • ${item.number.slice(0,4)}******</span>
                        <span>${item.amount} PKR</span>
                        <span>${item.status}</span>
                    </div>
                `).join('');
            }

            // Draw wheel
            function drawWheel(angle = 0) {
                const arc = (2 * Math.PI) / segments.length;
                ctx.clearRect(0, 0, 400, 400);
                
                for (let i = 0; i < segments.length; i++) {
                    const startAngle = i * arc + angle;
                    const endAngle = startAngle + arc;
                    
                    ctx.beginPath();
                    ctx.fillStyle = segments[i].color;
                    ctx.moveTo(200, 200);
                    ctx.arc(200, 200, 200, startAngle, endAngle);
                    ctx.closePath();
                    ctx.fill();

                    ctx.save();
                    ctx.translate(200, 200);
                    ctx.rotate(startAngle + arc / 2);
                    ctx.textAlign = 'center';
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 16px Inter';
                    ctx.fillText(segments[i].label, 100, 8);
                    ctx.restore();
                }

                // Center circle
                ctx.beginPath();
                ctx.arc(200, 200, 45, 0, 2 * Math.PI);
                ctx.fillStyle = '#fbbf24';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(200, 200, 35, 0, 2 * Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
            }

            drawWheel(currentAngle);

            // Money Rain
            function startMoneyRain() {
                const rainContainer = document.getElementById('moneyRain');
                for (let i = 0; i < 15; i++) {
                    const note = document.createElement('div');
                    note.className = 'money-note';
                    note.innerHTML = '💰';
                    note.style.left = Math.random() * 100 + '%';
                    note.style.animationDelay = Math.random() * 2 + 's';
                    rainContainer.appendChild(note);
                    
                    setTimeout(() => note.remove(), 3000);
                }
            }

            // Spin function
            window.spinWheel = function() {
                if (isSpinning) return;

                isSpinning = true;
                spinButton.disabled = true;
                spinResult.innerHTML = 'Spinning...';

                let spinVelocity = 0.6;
                const spinDeceleration = 0.97;
                
                function animateSpin() {
                    spinVelocity *= spinDeceleration;
                    currentAngle += spinVelocity;
                    drawWheel(currentAngle);

                    if (spinVelocity > 0.002) {
                        requestAnimationFrame(animateSpin);
                    } else {
                        const finalAngle = currentAngle % (2 * Math.PI);
                        let segmentIndex = Math.floor((2 * Math.PI - finalAngle) / ((2 * Math.PI) / segments.length)) % segments.length;
                        
                        const prize = segments[segmentIndex].value;
                        
                        if (prize > 0) {
                            balance += prize;
                            balanceSpan.innerText = balance;
                            
                            dailyStats.totalWon += prize;
                            dailyStats.todaySpins += 1;
                            if (prize > dailyStats.biggestWin) {
                                dailyStats.biggestWin = prize;
                            }
                            
                            spinResult.innerHTML = `🎉 You won ${prize} PKR!`;
                            startMoneyRain();
                        } else {
                            spinResult.innerHTML = `😞 Better luck next time!`;
                        }
                        
                        updateStatsDisplay();
                        
                        isSpinning = false;
                        spinButton.disabled = false;
                    }
                }

                requestAnimationFrame(animateSpin);
            };

            // Withdrawal methods
            window.selectMethod = function(method) {
                document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
                if (method === 'easypaisa') document.getElementById('methodEasypaisa').classList.add('active');
                if (method === 'jazzcash') document.getElementById('methodJazzcash').classList.add('active');
                if (method === 'upaisa') document.getElementById('methodUpaisa').classList.add('active');
            };

            window.processWithdrawal = function() {
                const amount = parseFloat(document.getElementById('withdrawAmount').value);
                const name = document.getElementById('accountName').value;
                const number = document.getElementById('accountNumber').value;
                
                let method = 'Easypaisa';
                if (document.getElementById('methodJazzcash').classList.contains('active')) method = 'JazzCash';
                if (document.getElementById('methodUpaisa').classList.contains('active')) method = 'UPaisa';

                if (!name || !number || !amount) {
                    alert('❌ Please fill all details');
                    return;
                }

                if (amount < 100) {
                    alert('❌ Minimum withdrawal is 100 PKR');
                    return;
                }

                if (amount > balance) {
                    alert('❌ Insufficient balance');
                    return;
                }

                // Process withdrawal
                balance -= amount;
                balanceSpan.innerText = balance;
                
                dailyStats.payouts += 1;
                
                dailyStats.history.unshift({
                    method: method,
                    number: number,
                    amount: amount,
                    status: 'Pending'
                });
                
                if (dailyStats.history.length > 5) {
                    dailyStats.history.pop();
                }
                
                updateStatsDisplay();

                // Clear form
                document.getElementById('accountName').value = '';
                document.getElementById('accountNumber').value = '';
                document.getElementById('withdrawAmount').value = '';

                alert(`✅ Withdrawal request submitted!\nAmount: ${amount} PKR\nMethod: ${method}`);
            };
        })();
    </script>
</body>
</html>
