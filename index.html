<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Code Editor - Scrollable Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Toolbar */
        .toolbar {
            background: #0f0f1a;
            padding: 8px 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #2a2a3a;
        }

        .toolbar button {
            background: #2a2a3a;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .toolbar button:hover {
            background: #4a4a5a;
        }

        .save-btn {
            background: #4ecdc4 !important;
            color: #1a1a2e !important;
        }

        .reset-btn {
            background: #ff6b6b !important;
        }

        /* Main Container */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 2px;
            background: #2a2a3a;
        }

        /* Editor Section */
        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e2e;
            min-width: 280px;
            overflow: hidden;
        }

        .tab-bar {
            display: flex;
            background: #0f0f1a;
            padding: 5px 10px 0 10px;
            gap: 3px;
        }

        .tab {
            padding: 8px 24px;
            background: #1e1e2e;
            color: #888;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
        }

        .tab.active {
            background: #2a2a3a;
            color: white;
            border-bottom: 2px solid #4ecdc4;
        }

        .code-area {
            flex: 1;
            background: #1e1e2e;
            overflow: auto;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: #1e1e2e;
            border: none;
            color: #d4d4d4;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            padding: 15px;
        }

        /* Preview Section - SCROLLABLE */
        .preview-section {
            flex: 1;
            background: #2a2a3a;
            display: flex;
            flex-direction: column;
            min-width: 300px;
        }

        .preview-header {
            background: #0f0f1a;
            padding: 8px 15px;
            color: #aaa;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-header a {
            color: #4ecdc4;
            text-decoration: none;
        }

        /* Ye hai fix — SCROLLABLE PREVIEW CONTAINER */
        .preview-scroll-container {
            flex: 1;
            overflow: auto;
            background: #f5f5f5;
            padding: 20px;
        }

        .preview-frame {
            width: 100%;
            height: auto;
            min-height: 100%;
            border: none;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* Console */
        .console-section {
            background: #0f0f1a;
            border-top: 1px solid #2a2a3a;
            height: 140px;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            padding: 6px 15px;
            background: #1a1a2e;
            color: #aaa;
            font-size: 11px;
            border-bottom: 1px solid #2a2a3a;
        }

        .console-output {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 11px;
            background: #0f0f1a;
            color: #d4d4d4;
        }

        .console-log { color: #4ecdc4; margin: 2px 0; }
        .console-error { color: #ff6b6b; margin: 2px 0; }
        .console-warn { color: #ffd93d; margin: 2px 0; }

        /* Resizer */
        .resizer {
            width: 5px;
            background: #2a2a3a;
            cursor: col-resize;
        }
        .resizer:hover {
            background: #4ecdc4;
        }

        .status-bar {
            background: #0f0f1a;
            padding: 4px 15px;
            color: #666;
            font-size: 10px;
            border-top: 1px solid #2a2a3a;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #4ecdc4;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="runBtn">▶ Run</button>
        <button id="saveBtn" class="save-btn">💾 Save HTML</button>
        <button id="resetBtn" class="reset-btn">🔄 Reset</button>
    </div>

    <div class="main-container">
        <!-- Editor -->
        <div class="editor-section">
            <div class="tab-bar">
                <div class="tab active" data-tab="html">HTML</div>
                <div class="tab" data-tab="css">CSS</div>
                <div class="tab" data-tab="js">JavaScript</div>
            </div>
            <div class="code-area">
                <textarea id="htmlEditor" placeholder="Write HTML here..."></textarea>
                <textarea id="cssEditor" placeholder="Write CSS here..." style="display: none;"></textarea>
                <textarea id="jsEditor" placeholder="Write JavaScript here..." style="display: none;"></textarea>
            </div>
        </div>

        <div class="resizer" id="resizer"></div>

        <!-- Preview - SCROLLABLE -->
        <div class="preview-section">
            <div class="preview-header">
                <span>📱 Live Preview (Scroll to see full website)</span>
                <a href="#" id="openNewTab">🔗 Open in new tab</a>
            </div>
            <div class="preview-scroll-container" id="previewScrollContainer">
                <iframe id="preview" class="preview-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
            </div>
            
            <!-- Console -->
            <div class="console-section">
                <div class="console-header">📋 Console Output</div>
                <div class="console-output" id="consoleOutput">
                    <div style="color: #666;">→ Ready. Click Run to start.</div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar" id="statusBar">Ready | Auto-saved</div>

    <script>
        const htmlEditor = document.getElementById('htmlEditor');
        const cssEditor = document.getElementById('cssEditor');
        const jsEditor = document.getElementById('jsEditor');
        const preview = document.getElementById('preview');
        const consoleOutput = document.getElementById('consoleOutput');
        const runBtn = document.getElementById('runBtn');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const openNewTab = document.getElementById('openNewTab');
        const statusBar = document.getElementById('statusBar');
        const tabs = document.querySelectorAll('.tab');
        
        let activeTab = 'html';
        
        // Default templates
        const defaultHTML = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
</head>
<body>
    <div style="max-width: 800px; margin: 0 auto; padding: 40px; font-family: 'Segoe UI', sans-serif;">
        <h1 style="color: #4ecdc4;">✨ Welcome!</h1>
        <p>This is a scrollable preview. Scroll down to see more content 👇</p>
        
        <div style="margin-top: 40px; padding: 20px; background: #f0f0f0; border-radius: 12px;">
            <h3>Section 1</h3>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </div>
        
        <div style="margin-top: 40px; padding: 20px; background: #f0f0f0; border-radius: 12px;">
            <h3>Section 2</h3>
            <p>Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
        </div>
        
        <div style="margin-top: 40px; padding: 20px; background: #f0f0f0; border-radius: 12px;">
            <h3>Section 3</h3>
            <p>Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.</p>
        </div>
        
        <div style="margin-top: 40px; padding: 20px; background: #f0f0f0; border-radius: 12px;">
            <h3>Section 4</h3>
            <p>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore.</p>
        </div>
        
        <div style="margin-top: 40px; padding: 20px; background: #ff6b6b20; border-radius: 12px; text-align: center;">
            <button onclick="alert('Hello!')" style="padding: 12px 24px; background: #4ecdc4; border: none; border-radius: 8px; cursor: pointer;">Click Me</button>
        </div>
        
        <p style="margin-top: 60px; text-align: center; color: #666;">Scroll karke dekho — puri website dikh rahi hai! 🎉</p>
    </div>
    
    <script>
        console.log('Website loaded! Scroll to see full content.');
    <\/script>
</body>
</html>`;

        const defaultCSS = `/* Your CSS here */`;
        const defaultJS = `// Your JavaScript here`;
        
        function switchTab(tab) {
            activeTab = tab;
            tabs.forEach(t => {
                if (t.dataset.tab === tab) t.classList.add('active');
                else t.classList.remove('active');
            });
            htmlEditor.style.display = tab === 'html' ? 'block' : 'none';
            cssEditor.style.display = tab === 'css' ? 'block' : 'none';
            jsEditor.style.display = tab === 'js' ? 'block' : 'none';
        }
        
        function generateCompleteHTML() {
            let html = htmlEditor.value;
            const css = cssEditor.value;
            const js = jsEditor.value;
            
            if (!html.trim()) {
                return `<div style="display: flex; align-items: center; justify-content: center; height: 100vh;"><h2>📝 Write HTML in the editor!</h2></div>`;
            }
            
            if (css.trim() || js.trim()) {
                if (html.includes('</body>')) {
                    if (css.trim() && !html.includes('<style>')) {
                        html = html.replace('</head>', `<style>\n${css}\n</style>\n</head>`);
                    }
                    if (js.trim()) {
                        html = html.replace('</body>', `<script>\n${js}\n<\/script>\n</body>`);
                    }
                } else {
                    html = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">${css.trim() ? `<style>\n${css}\n</style>` : ''}</head>
<body>${html}${js.trim() ? `<script>\n${js}\n<\/script>` : ''}</body>
</html>`;
                }
            }
            return html;
        }
        
        function updatePreview() {
            const fullHTML = generateCompleteHTML();
            const previewDoc = preview.contentWindow.document;
            previewDoc.open();
            previewDoc.write(fullHTML);
            previewDoc.close();
            
            consoleOutput.innerHTML = '<div style="color: #666;">→ Console output will appear here...</div>';
            statusBar.textContent = `Updated: ${new Date().toLocaleTimeString()} | Auto-saved`;
            
            localStorage.setItem('savedHTML', htmlEditor.value);
            localStorage.setItem('savedCSS', cssEditor.value);
            localStorage.setItem('savedJS', jsEditor.value);
        }
        
        function saveAsHTML() {
            const fullHTML = generateCompleteHTML();
            const blob = new Blob([fullHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `website-${Date.now()}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusBar.textContent = `Saved! ✅`;
            setTimeout(() => statusBar.textContent = `Ready | Auto-saved`, 2000);
        }
        
        function resetToDefault() {
            htmlEditor.value = defaultHTML;
            cssEditor.value = defaultCSS;
            jsEditor.value = defaultJS;
            updatePreview();
            statusBar.textContent = `Reset to default ✅`;
            setTimeout(() => statusBar.textContent = `Ready | Auto-saved`, 2000);
        }
        
        function openInNewTab() {
            const fullHTML = generateCompleteHTML();
            const blob = new Blob([fullHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
        
        function loadSavedData() {
            const savedHTML = localStorage.getItem('savedHTML');
            const savedCSS = localStorage.getItem('savedCSS');
            const savedJS = localStorage.getItem('savedJS');
            htmlEditor.value = savedHTML || defaultHTML;
            cssEditor.value = savedCSS || defaultCSS;
            jsEditor.value = savedJS || defaultJS;
        }
        
        let autoSaveTimeout;
        function autoSave() {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => {
                localStorage.setItem('savedHTML', htmlEditor.value);
                localStorage.setItem('savedCSS', cssEditor.value);
                localStorage.setItem('savedJS', jsEditor.value);
            }, 1000);
        }
        
        // Console capture
        function captureConsole() {
            const originalLog = console.log;
            const originalError = console.error;
            const originalWarn = console.warn;
            
            console.log = function(...args) {
                const msg = args.join(' ');
                const div = document.createElement('div');
                div.className = 'console-log';
                div.textContent = `→ ${msg}`;
                consoleOutput.appendChild(div);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
                originalLog.apply(console, args);
            };
            
            console.error = function(...args) {
                const msg = args.join(' ');
                const div = document.createElement('div');
                div.className = 'console-error';
                div.textContent = `❌ ${msg}`;
                consoleOutput.appendChild(div);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
                originalError.apply(console, args);
            };
            
            console.warn = function(...args) {
                const msg = args.join(' ');
                const div = document.createElement('div');
                div.className = 'console-warn';
                div.textContent = `⚠️ ${msg}`;
                consoleOutput.appendChild(div);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
                originalWarn.apply(console, args);
            };
        }
        
        // Resizer
        let isResizing = false;
        const resizer = document.getElementById('resizer');
        const editorSection = document.querySelector('.editor-section');
        const previewSection = document.querySelector('.preview-section');
        
        resizer.addEventListener('mousedown', () => isResizing = true);
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const container = document.querySelector('.main-container');
            const rect = container.getBoundingClientRect();
            const newWidth = ((e.clientX - rect.left) / rect.width) * 100;
            if (newWidth > 20 && newWidth < 80) {
                editorSection.style.flex = `${newWidth}`;
                previewSection.style.flex = `${100 - newWidth}`;
            }
        });
        document.addEventListener('mouseup', () => isResizing = false);
        
        // Events
        runBtn.addEventListener('click', updatePreview);
        saveBtn.addEventListener('click', saveAsHTML);
        resetBtn.addEventListener('click', resetToDefault);
        openNewTab.addEventListener('click', (e) => { e.preventDefault(); openInNewTab(); });
        
        htmlEditor.addEventListener('input', () => { autoSave(); updatePreview(); });
        cssEditor.addEventListener('input', () => { autoSave(); updatePreview(); });
        jsEditor.addEventListener('input', () => { autoSave(); updatePreview(); });
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });
        
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveAsHTML(); }
            if ((e.ctrlKey || e.metaKey) && e.key === 'r') { e.preventDefault(); updatePreview(); }
        });
        
        captureConsole();
        loadSavedData();
        switchTab('html');
        updatePreview();
        
        // Iframe load handler
        preview.addEventListener('load', () => {
            try {
                const iframeWindow = preview.contentWindow;
                iframeWindow.console = console;
            } catch(e) {}
        });
    </script>
</body>
</html>
